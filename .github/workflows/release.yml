name: Release

# Runs automatically when you push a version tag (e.g. v1.0.1)
# Also runnable manually from GitHub → Actions → Release → Run workflow
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ── Mac build (arm64 + x64 DMG & PKG from a single ARM runner) ────────────
  release-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (ARM-native)
        run: npm ci

      - name: Cross-install x64 Sharp for Intel builds
        run: npm install --os=darwin --cpu=x64 sharp

      - name: Build Next.js + prepare standalone
        run: npm run build:electron

      - name: Inject x64 Sharp binary into standalone output
        run: |
          for pkg in sharp-darwin-x64 sharp-libvips-darwin-x64; do
            if [ -d "node_modules/@img/$pkg" ]; then
              mkdir -p ".next/standalone/node_modules/@img"
              cp -r "node_modules/@img/$pkg" ".next/standalone/node_modules/@img/"
              echo "Copied @img/$pkg into standalone"
            fi
          done

      # Step 1 — build both DMGs together in one call.
      # This produces a single unified latest-mac.yml (needed for auto-updates).
      # DMG target has no race condition with multiple architectures.
      - name: Package & publish DMGs (arm64 + x64)
        run: npx electron-builder --mac dmg --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Step 2 — build PKGs one architecture at a time to avoid the race
      # condition in electron-builder where concurrent arch builds try to
      # delete the same intermediate file (com.langtownandcountry.poster.pkg).
      - name: Build arm64 PKG
        run: npx electron-builder --mac pkg --arm64 --publish never

      - name: Build x64 PKG
        run: npx electron-builder --mac pkg --x64 --publish never

      # Step 3 — upload the PKGs manually to the release that Step 1 created.
      - name: Upload PKG files to GitHub release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          for f in dist-electron/*.pkg; do
            gh release upload "v$VERSION" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  # ── Windows build (x64 NSIS exe + MSI) ────────────────────────────────────
  release-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js + prepare standalone
        run: npm run build:electron

      - name: Package & publish Windows installers
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
