name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  # ── Mac build (arm64 + x64 DMG) ───────────────────────────────────────────
  release-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (ARM-native)
        run: npm ci

      - name: Cross-install x64 Sharp for Intel DMG
        run: npm install --os=darwin --cpu=x64 sharp

      - name: Build Next.js + prepare standalone
        run: npm run build:electron

      - name: Inject x64 Sharp binary into standalone output
        run: |
          for pkg in sharp-darwin-x64 sharp-libvips-darwin-x64; do
            if [ -d "node_modules/@img/$pkg" ]; then
              mkdir -p ".next/standalone/node_modules/@img"
              cp -r "node_modules/@img/$pkg" ".next/standalone/node_modules/@img/"
              echo "Copied @img/$pkg into standalone"
            fi
          done

      - name: Package & publish DMGs (arm64 + x64)
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  # ── Windows build (x64 NSIS exe + MSI) ────────────────────────────────────
  release-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js + prepare standalone
        run: npm run build:electron

      - name: Package & publish Windows installers
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
