<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lang Poster — Setup</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
        color: #0f172a;
        background: #fff;
      }
      h1 {
        font-size: 17px;
        margin: 0 0 6px;
      }
      p {
        font-size: 12px;
        color: #64748b;
        margin: 0 0 14px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        font-size: 14px;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        font-family: ui-monospace, Menlo, monospace;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 14px;
        justify-content: flex-end;
      }
      button {
        padding: 7px 14px;
        font-size: 13px;
        border-radius: 4px;
        border: 1px solid #cbd5e1;
        background: #fff;
        cursor: pointer;
      }
      button.primary {
        background: #0f172a;
        color: white;
        border-color: #0f172a;
      }
      button.primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>Enter your Anthropic API key</h1>
    <p>
      Used for caption writing and image classification. Stored locally in
      your user data folder — you only need to do this once.
    </p>
    <input id="key" type="password" placeholder="sk-ant-…" autofocus />
    <div class="row">
      <button id="cancel">Quit</button>
      <button id="save" class="primary" disabled>Save &amp; continue</button>
    </div>
    <script>
      const input = document.getElementById("key");
      const save = document.getElementById("save");
      const cancel = document.getElementById("cancel");

      input.addEventListener("input", () => {
        save.disabled = input.value.trim().length < 10;
      });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !save.disabled) save.click();
      });
      save.addEventListener("click", () => {
        window.api.submitKey(input.value.trim());
      });
      cancel.addEventListener("click", () => window.api.cancel());
    </script>
  </body>
</html>
